name: Build and publish to NPM

on:
  push:
    tags:
      - v*.*.*

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '23'
          registry-url: 'https://registry.npmjs.org'
          scope: '@devantage'
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - run: npm publish --access public
